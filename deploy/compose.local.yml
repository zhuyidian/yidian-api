services:
  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend-dev
    image: yidian-api-frontend-dev:local
    working_dir: /workspace
    command: ["sh", "-c", "cd default && bun run dev"]
    restart: unless-stopped
    environment:
      VITE_REACT_APP_SERVER_URL: http://new-api:3000
    ports:
      - "3001:3000"
    volumes:
      - ./web/default/src:/workspace/default/src
      - ./web/default/public:/workspace/default/public
    depends_on:
      - new-api
    networks:
      - dev-network
